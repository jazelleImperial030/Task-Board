name: PR Merge Discord Report

on:
  pull_request:
    types: [closed]

jobs:
  report:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO" | head -c 12000 || echo "Could not fetch diff")
          echo "diff<<EOFMARKER" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT

      - name: Summarize and post to Discord
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          pr_title = os.environ.get("PR_TITLE", "")
          pr_body = os.environ.get("PR_BODY", "") or ""
          pr_author = os.environ.get("PR_AUTHOR", "")
          pr_url = os.environ.get("PR_URL", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_diff = os.environ.get("PR_DIFF", "")
          openrouter_key = os.environ.get("OPENROUTER_API_KEY", "")
          discord_url = os.environ.get("DISCORD_WEBHOOK_URL", "")

          # Build AI prompt
          prompt = f"""You are a concise PR reporter for a Discord channel. Given the following pull request details and code diff, write a short human-readable summary (2-4 sentences max) of ONLY the behavioral changes — what changed from the user's perspective. Do not mention file names, function names, or technical implementation details. Write as if explaining to a non-technical team member.

          PR Title: {pr_title}
          PR Description: {pr_body}

          Code Diff:
          {pr_diff[:10000]}"""

          # Call OpenRouter
          summary = f"A PR was merged: {pr_title}"
          try:
              payload = json.dumps({
                  "model": "openrouter/auto",
                  "messages": [{"role": "user", "content": prompt}],
                  "max_tokens": 300
              }).encode()

              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {openrouter_key}",
                      "Content-Type": "application/json"
                  }
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read())
                  summary = data["choices"][0]["message"]["content"]
                  print(f"AI Summary: {summary}")
          except Exception as e:
              print(f"::warning::AI summarization failed: {e}, using fallback")

          # Post to Discord — use simple content instead of embed to avoid formatting issues
          clean_summary = summary.strip()[:1900]
          message = f"**PR #{pr_number} Merged** — _{pr_title}_\n**Author:** {pr_author}\n\n{clean_summary}\n\n🔗 {pr_url}"

          discord_payload = json.dumps({"content": message}).encode()

          req = urllib.request.Request(
              discord_url,
              data=discord_payload,
              headers={"Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Discord response: {resp.status}")
                  print("Discord notification sent!")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"Discord error {e.code}: {error_body}")
              raise
          PYEOF
