name: PR Merge Discord Report

on:
  pull_request:
    types: [closed]

jobs:
  report:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO" | head -c 12000 || echo "Could not fetch diff")
          echo "diff<<EOFMARKER" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT

      - name: Evaluate and post to Discord
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          pr_title = os.environ.get("PR_TITLE", "")
          pr_body = os.environ.get("PR_BODY", "") or ""
          pr_author = os.environ.get("PR_AUTHOR", "")
          pr_url = os.environ.get("PR_URL", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_branch = os.environ.get("PR_BRANCH", "")
          pr_diff = os.environ.get("PR_DIFF", "")
          openrouter_key = os.environ.get("OPENROUTER_API_KEY", "")
          discord_url = os.environ.get("DISCORD_WEBHOOK_URL", "")

          system_context = """You are a team member at UTAK, a cloud-based POS (Point of Sale) system for restaurants, cafes, and retail businesses in the Philippines. You know the system inside out:

UTAK SYSTEM OVERVIEW:
- UTAK POS (Mobile App): The cashier-facing app used in stores. Handles transactions, cash drawer, shifts, receipts, kitchen display (KDS), inventory, order management, thermal printing, and offline-first operations. Integrates with delivery platforms (FoodPanda, Grab, Shopee, Lazada). Supports mall compliance modes (SM, Robinsons, Megaworld, etc.). BIR tax compliant.
- UTAK Back Office (Web): The merchant dashboard. Provides sales analytics, transaction history, reports, inventory management, staff management, menu/item management, billing, settings, and multi-branch management for master accounts.
- UTAK Cloud Functions: The backend. Handles payment processing (Stripe, Xendit, PayMongo, GCash), daily sales emails, inventory reset jobs (3:30 AM daily), Z-reading generation, push notifications, mall server integrations, OTP/authentication, and admin tools.
- Database: Firebase Realtime Database. Each merchant has isolated data — transactions, settings, menu, inventory, shifts, cash drawer, orders, staff, devices.

KEY OPERATIONS:
- Cashiers use the POS app to ring up sales, manage cash drawer, process refunds, handle delivery orders, and generate shift reports (X/Z readings).
- Store owners use the Back Office to monitor sales, manage inventory, configure settings, and run reports.
- Cloud functions automate inventory resets, send daily sales emails, process payments, and sync with mall servers.

CLIENTS & DEPARTMENTS AFFECTED:
- Cashiers and store staff (POS app users)
- Store owners and managers (Back Office users)
- Customers (receipt changes, payment method changes, order flow changes)
- Delivery operations (FoodPanda, Grab, etc.)
- Mall compliance (SM, Robinsons, Megaworld reporting)
- Finance/billing (payment processing, subscriptions)"""

          # Step 1: Ask AI to evaluate if this PR affects operations
          evaluate_prompt = f"""{system_context}

You are reviewing a merged pull request. Your job is to decide: does this change affect how the business operates? Does it impact cashiers, store owners, customers, delivery operations, or any department?

REPORT if the change:
- Affects how cashiers use the POS (transaction flow, cash drawer behavior, receipt changes, printing, shift operations)
- Changes what store owners see or can do in the Back Office (reports, settings, dashboard, inventory)
- Impacts customers (payment methods, order flow, receipts, online ordering)
- Affects delivery operations or mall compliance
- Changes billing, subscriptions, or payment processing
- Fixes a bug that was causing real operational issues (wrong calculations, data loss, incorrect alerts)
- Adds restrictions or limits that affect daily operations (e.g. date range limits, download limits)
- Changes inventory behavior, automated jobs, or notifications

DO NOT REPORT if the change:
- Is purely a code refactor with no behavior change
- Only updates CI/CD, GitHub Actions, workflows, or dev tooling
- Is a hardcoded config change for a specific merchant (unless it reveals a broader issue)
- Only changes code formatting, comments, or documentation
- Is a dependency update with no feature change
- Is an internal dev tool change

Respond with EXACTLY one of these formats:
REPORT: (if it should be reported)
SKIP: (if it should not be reported)

PR Title: {pr_title}
PR Description: {pr_body}
Branch: {pr_branch}

Code Diff:
{pr_diff[:10000]}"""

          def call_openrouter(prompt_text, max_tokens=500):
              payload = json.dumps({
                  "model": "openrouter/auto",
                  "messages": [{"role": "user", "content": prompt_text}],
                  "max_tokens": max_tokens
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {openrouter_key}",
                      "Content-Type": "application/json"
                  }
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.loads(resp.read())
                  return data["choices"][0]["message"]["content"]

          # Step 1: Evaluate
          try:
              evaluation = call_openrouter(evaluate_prompt, max_tokens=50)
              print(f"Evaluation: {evaluation}")
          except Exception as e:
              print(f"::warning::Evaluation failed: {e}, defaulting to REPORT")
              evaluation = "REPORT:"

          if evaluation.strip().upper().startswith("SKIP"):
              print("PR does not affect operations. Skipping Discord report.")
              exit(0)

          # Step 2: Generate natural summary
          summary_prompt = f"""{system_context}

A pull request was just merged. Write a message for the team Discord channel explaining what changed and how it affects operations. Write naturally like a team member giving an update — not like a bot or a changelog.

Guidelines:
- 3-5 sentences, conversational tone
- Explain the behavioral change and WHY it matters
- Mention which part of the system is affected (POS, Back Office, cloud functions, etc.)
- If it is a bugfix, explain what was going wrong and how it is fixed now
- If it is a new feature or restriction, explain what users will notice
- Always complete your sentences
- Do not mention file names, function names, variable names, or any code details
- Do not use bullet points or markdown formatting
- Write as plain text, like you are talking to the team on Discord

PR Title: {pr_title}
PR Description: {pr_body}
Branch: {pr_branch}
Author: {pr_author}

Code Diff:
{pr_diff[:10000]}"""

          try:
              summary = call_openrouter(summary_prompt, max_tokens=500)
              print(f"AI Summary: {summary}")
          except Exception as e:
              print(f"::warning::AI summarization failed: {e}")
              summary = f"A change was merged: {pr_title}"

          # Post to Discord
          clean_summary = summary.strip()[:1900]
          message = f"\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\nPR #{pr_number} Merged by {pr_author}\nBranch: **{pr_branch}**  Created by: {pr_author}\nSummary: {clean_summary}"

          discord_payload = json.dumps({"content": message}).encode()

          req = urllib.request.Request(
              discord_url,
              data=discord_payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "UTAK-PR-Reporter/1.0"
              }
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Discord response: {resp.status}")
                  print("Discord notification sent!")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"Discord error {e.code}: {error_body}")
              raise
          PYEOF
